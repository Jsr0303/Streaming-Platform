version: '3.9'

# ──────────────────────────────────────────────────────────────────────────────
# MediaVerse — Docker Compose for 50k-100k RPM scale
# Architecture:
#   Nginx (load balancer + cache) → 4× Next.js app instances → Redis
# ──────────────────────────────────────────────────────────────────────────────

networks:
  mediaverse:
    driver: bridge

volumes:
  redis_data:
  nginx_cache:

services:
  # ─── Nginx — Load Balancer + Static Cache ──────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: mediaverse_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - app1
      - app2
      - app3
      - app4
    networks:
      - mediaverse
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # ─── App Instances (4 replicas for ~100k RPM) ──────────────────────────────
  app1: &app_base
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: mediaverse_app1
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - INSTANCE_ID=app1
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - mediaverse
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  app2:
    <<: *app_base
    container_name: mediaverse_app2
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - INSTANCE_ID=app2
      - NEXT_TELEMETRY_DISABLED=1

  app3:
    <<: *app_base
    container_name: mediaverse_app3
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - INSTANCE_ID=app3
      - NEXT_TELEMETRY_DISABLED=1

  app4:
    <<: *app_base
    container_name: mediaverse_app4
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - INSTANCE_ID=app4
      - NEXT_TELEMETRY_DISABLED=1

  # ─── Redis — Caching + Rate Limit Store ────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: mediaverse_redis
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --loglevel warning
      --tcp-keepalive 60
      --hz 20
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mediaverse
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 2.5G

  # ─── Redis Sentinel (HA) ───────────────────────────────────────────────────
  redis-sentinel:
    image: redis:7.2-alpine
    container_name: mediaverse_sentinel
    command: redis-sentinel /etc/sentinel.conf
    ports:
      - "26379:26379"
    volumes:
      - ./redis/sentinel.conf:/etc/sentinel.conf:ro
    depends_on:
      - redis
    networks:
      - mediaverse
    restart: unless-stopped

  # ─── Monitoring: Redis Exporter ────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: mediaverse_redis_exporter
    environment:
      - REDIS_ADDR=redis://redis:6379
    ports:
      - "9121:9121"
    networks:
      - mediaverse
    depends_on:
      - redis
