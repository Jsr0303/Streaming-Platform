# ──────────────────────────────────────────────────────────────────────────────
# Nginx — High-Performance Load Balancer for 50k-100k RPM
# ──────────────────────────────────────────────────────────────────────────────

user  nginx;

# Auto-detect CPU cores
worker_processes auto;
worker_cpu_affinity auto;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

# ─── Events ──────────────────────────────────────────────────────────────────
events {
    worker_connections  4096;     # Per worker. 4 workers × 4096 = 16,384 concurrent
    use epoll;                    # Linux epoll for async I/O
    multi_accept on;              # Accept all pending connections at once
    accept_mutex off;             # Reduces latency for high-traffic
}

# ─── HTTP ─────────────────────────────────────────────────────────────────────
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Logging (structured JSON for monitoring) ─────────────────────────────
    log_format main_json escape=json
        '{'
          '"time":"$time_iso8601",'
          '"remote_addr":"$remote_addr",'
          '"method":"$request_method",'
          '"uri":"$uri",'
          '"status":$status,'
          '"bytes_sent":$bytes_sent,'
          '"request_time":$request_time,'
          '"upstream_time":"$upstream_response_time",'
          '"upstream_addr":"$upstream_addr",'
          '"http_referrer":"$http_referer",'
          '"http_user_agent":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/access.log main_json buffer=64k flush=5m;

    # ─── Performance ─────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75s;
    keepalive_requests 10000;

    # ─── Compression ─────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 1000;
    gzip_types
        text/plain text/css text/xml
        application/json application/javascript
        application/xml+rss application/atom+xml
        image/svg+xml;

    # ─── Rate Limiting (Nginx layer — first line of defense) ─────────────────
    # API: 200 req/s per IP with burst of 100
    limit_req_zone $binary_remote_addr zone=api_limit:20m  rate=200r/s;
    # General pages: 50 req/s per IP
    limit_req_zone $binary_remote_addr zone=web_limit:20m  rate=50r/s;
    # Upload: 5 req/s per IP
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/s;
    # Global: 10k req/s across all
    limit_req_zone $server_addr       zone=global_limit:20m  rate=10000r/s;

    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ─── Proxy Cache (Nginx caches upstream responses) ───────────────────────
    proxy_cache_path /var/cache/nginx
        levels=1:2
        keys_zone=MEDIA_CACHE:32m
        max_size=8g
        inactive=60m
        use_temp_path=off;

    # ─── Upstream — 4 App Instances (Round Robin + Health Checks) ────────────
    upstream mediaverse_app {
        least_conn;                   # Least-connections algorithm
        keepalive 128;                # Persistent connections to backends

        server app1:3000 max_fails=3 fail_timeout=10s weight=1;
        server app2:3000 max_fails=3 fail_timeout=10s weight=1;
        server app3:3000 max_fails=3 fail_timeout=10s weight=1;
        server app4:3000 max_fails=3 fail_timeout=10s weight=1;
    }

    # ─── Connection limits ────────────────────────────────────────────────────
    client_max_body_size       500m;  # For media uploads
    client_body_timeout        30s;
    client_header_timeout      15s;
    send_timeout               30s;
    proxy_connect_timeout      5s;
    proxy_send_timeout         30s;
    proxy_read_timeout         30s;

    # ─── Buffer tuning ───────────────────────────────────────────────────────
    proxy_buffering            on;
    proxy_buffer_size          16k;
    proxy_buffers              8 32k;
    proxy_busy_buffers_size    64k;

    # ─── Security headers ────────────────────────────────────────────────────
    server_tokens off;
    add_header X-Frame-Options         "SAMEORIGIN"        always;
    add_header X-Content-Type-Options  "nosniff"           always;
    add_header X-XSS-Protection        "1; mode=block"     always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header X-Powered-By            "MediaVerse"        always;

    # ─── Real IP (for Cloudflare / upstream proxy) ────────────────────────────
    set_real_ip_from  10.0.0.0/8;
    set_real_ip_from  172.16.0.0/12;
    set_real_ip_from  192.168.0.0/16;
    real_ip_header    X-Forwarded-For;

    include /etc/nginx/conf.d/*.conf;
}
