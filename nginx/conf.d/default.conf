# ──────────────────────────────────────────────────────────────────────────────
# Nginx Server Block — MediaVerse
# ──────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name mediaverse.app www.mediaverse.app _;

    # ─── Static Assets — Long-lived cache, served by Nginx directly ──────────
    location /_next/static/ {
        proxy_pass http://mediaverse_app;
        proxy_cache MEDIA_CACHE;
        proxy_cache_valid 200 365d;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # ─── Public assets ────────────────────────────────────────────────────────
    location /public/ {
        proxy_pass http://mediaverse_app;
        proxy_cache MEDIA_CACHE;
        proxy_cache_valid 200 24h;
        add_header Cache-Control "public, max-age=86400";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # ─── API — Rate limited, short cache ─────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=200 nodelay;
        limit_req zone=global_limit burst=5000 nodelay;
        limit_conn conn_limit 100;

        proxy_pass http://mediaverse_app;
        proxy_cache MEDIA_CACHE;
        proxy_cache_valid 200 1m;
        proxy_cache_key "$scheme$request_method$host$request_uri$http_authorization";
        proxy_cache_bypass $http_pragma $http_authorization;
        proxy_no_cache $http_pragma $http_authorization;

        add_header X-Cache-Status $upstream_cache_status;
        add_header X-RateLimit-Limit 200;

        # Pass real client IP
        proxy_set_header  X-Real-IP        $remote_addr;
        proxy_set_header  X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header  Host             $host;
    }

    # ─── Upload endpoint — Extra rate limiting ────────────────────────────────
    location /upload {
        limit_req zone=upload_limit burst=10 nodelay;
        proxy_pass http://mediaverse_app;
        client_max_body_size 2g;
        proxy_request_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ─── Health check endpoint — No rate limiting, no cache ──────────────────
    location /api/health {
        proxy_pass http://mediaverse_app;
        proxy_cache off;
        proxy_no_cache 1;
        access_log off;
    }

    # ─── All other pages ─────────────────────────────────────────────────────
    location / {
        limit_req zone=web_limit burst=100 nodelay;
        limit_req zone=global_limit burst=5000 nodelay;

        proxy_pass http://mediaverse_app;
        proxy_cache MEDIA_CACHE;
        proxy_cache_valid 200 5m;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
        proxy_cache_background_update on;

        # WebSocket support (for future live features)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # ─── Block common exploit probes ─────────────────────────────────────────
    location ~ /\.(ht|git|env|DS_Store) {
        deny all;
        return 404;
    }
}
